name: AISO Sentiment Fetcher

on:
  schedule:
    - cron: '0 * * * *'   # every hour at :00
  workflow_dispatch:       # manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit score files back to repo

    steps:

      # ── 1. Checkout ────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install deps ────────────────────────────────────
      - name: Install dependencies
        run: pip install requests

      # ── 4. Fetch ALL 14 assets ─────────────────────────────
      #    Runs fetcher_v2.py --all which saves:
      #      scores/BTC.json
      #      scores/ETH.json
      #      scores/SOL.json
      #      scores/SPY.json
      #      scores/QQQ.json
      #      scores/NVDA.json
      #      scores/TSLA.json
      #      scores/MSTR.json
      #      scores/GOLD.json
      #      scores/SILVER.json
      #      scores/OIL.json
      #      scores/EURUSD.json
      #      scores/GBPUSD.json
      #      scores/USDJPY.json
      #      aiso_all_scores.json   (all assets combined — used by dashboard)
      #      aiso_score.json        (BTC only — backward compat)
      - name: Fetch all market scores
        run: python fetcher_v2.py --all

      # ── 5. Commit all score files back to repo ─────────────
      - name: Commit scores to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scores/ aiso_all_scores.json aiso_score.json
          git diff --staged --quiet || git commit -m "chore: update all market scores [skip ci]"
          git push

      # ── 6. Telegram alert (optional) ──────────────────────
      #    Sends a summary of all scores to your Telegram.
      #    Set TELEGRAM_TOKEN and TELEGRAM_CHAT_ID in:
      #    Repo → Settings → Secrets and variables → Actions
      - name: Send Telegram summary
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'EOF'
          import json, os, urllib.request, urllib.parse

          token   = os.environ.get("TELEGRAM_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")

          if not token or not chat_id:
              print("Telegram secrets not configured — skipping.")
              exit(0)

          try:
              with open("aiso_all_scores.json") as f:
                  summary = json.load(f)
          except Exception as e:
              print(f"Could not read summary: {e}")
              exit(0)

          assets = summary.get("assets", {})
          ts     = summary.get("generated_at", "")[:16].replace("T", " ")

          EMOJI = {"EXTREME GREED":"🟢","GREED":"🔵","NEUTRAL":"⚪",
                   "FEAR":"🟡","EXTREME FEAR":"🔴"}

          # Group by category
          cats = {"crypto":[],"stocks":[],"commodity":[],"forex":[]}
          for key, d in assets.items():
              cat = d.get("category","crypto")
              cats.setdefault(cat, []).append(d)

          cat_labels = {"crypto":"Crypto","stocks":"Stocks",
                        "commodity":"Commodities","forex":"Forex"}

          lines = ["*AISO — Market Sentiment Update*",
                   f"_{ts} UTC_",
                   "━━━━━━━━━━━━━━━━━━"]

          for cat, cat_lbl in cat_labels.items():
              group = cats.get(cat, [])
              if not group: continue
              lines.append(f"\n*{cat_lbl}*")
              for d in group:
                  score = d["composite"]
                  zone  = d["zone"]
                  sign  = "+" if score >= 0 else ""
                  icon  = EMOJI.get(zone, "⚪")
                  lines.append(f"{icon} `{d['asset']:<7}` {sign}{score:>6.1f}  _{zone}_")

          lines.append("\n━━━━━━━━━━━━━━━━━━")
          lines.append("Open dashboard to copy any score → paste into TradingView Bias Score")

          msg  = "\n".join(lines)
          url  = f"https://api.telegram.org/bot{token}/sendMessage"
          data = urllib.parse.urlencode({
              "chat_id"    : chat_id,
              "text"       : msg,
              "parse_mode" : "Markdown",
          }).encode()

          try:
              req = urllib.request.Request(url, data=data)
              urllib.request.urlopen(req, timeout=10)
              print(f"Telegram sent — {len(assets)} assets")
          except Exception as e:
              print(f"Telegram failed: {e}")
              exit(0)
          EOF
