name: AISO Sentiment Fetcher

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour at :00
  workflow_dispatch:       # also allows manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit results back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests
      - name: Run fetcher
        run: python fetcher.py

      - name: Commit score to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aiso_score.json
          git diff --staged --quiet || git commit -m "Update sentiment score"
          git push

